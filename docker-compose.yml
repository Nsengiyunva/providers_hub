version: '3.8'

services:
  # PostgreSQL for transactional data
  postgres:
    image: postgres:15-alpine
    container_name: eventhub-postgres
    environment:
      POSTGRES_USER: eventhub
      POSTGRES_PASSWORD: eventhub123
      POSTGRES_DB: eventhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - eventhub-network

  # MongoDB for profiles and media metadata
  mongodb:
    image: mongo:7
    container_name: eventhub-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: eventhub
      MONGO_INITDB_ROOT_PASSWORD: eventhub123
      MONGO_INITDB_DATABASE: eventhub
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - eventhub-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: eventhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eventhub-network

  # Kafka in KRaft mode (no ZooKeeper required - Kafka 3.3+)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eventhub-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      
      # Cluster settings
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      
      # Log settings
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - eventhub-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    command: >
      bash -c "
        # Format storage if not already formatted
        if [ ! -f /var/lib/kafka/data/meta.properties ]; then
          kafka-storage format -t MkU3OEVBNTcwNTJENDM2Qk -c /etc/kafka/kraft/server.properties
        fi
        # Start Kafka
        /etc/confluent/docker/run
      "

  # MinIO for object storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: eventhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eventhub
      MINIO_ROOT_PASSWORD: eventhub123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - eventhub-network

  # API Gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: eventhub-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - kafka
    networks:
      - eventhub-network

  # User Service
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: eventhub-user-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://eventhub:eventhub123@postgres:5432/eventhub
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - eventhub-network

  # Profile Service
  profile-service:
    build:
      context: ./services/profile-service
      dockerfile: Dockerfile
    container_name: eventhub-profile-service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      MONGODB_URI: mongodb://eventhub:eventhub123@mongodb:27017/eventhub?authSource=admin
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - eventhub-network

  # Catalog Service
  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    container_name: eventhub-catalog-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://eventhub:eventhub123@postgres:5432/eventhub
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - eventhub-network

  # Inquiry Service
  inquiry-service:
    build:
      context: ./services/inquiry-service
      dockerfile: Dockerfile
    container_name: eventhub-inquiry-service
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://eventhub:eventhub123@postgres:5432/eventhub
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - eventhub-network

  # Payment Service
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: eventhub-payment-service
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: postgresql://eventhub:eventhub123@postgres:5432/eventhub
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      STRIPE_SECRET_KEY: sk_test_your_stripe_key_here
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - eventhub-network

  # Review Service
  review-service:
    build:
      context: ./services/review-service
      dockerfile: Dockerfile
    container_name: eventhub-review-service
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: postgresql://eventhub:eventhub123@postgres:5432/eventhub
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - eventhub-network

  # Notification Service
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: eventhub-notification-service
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: development
      PORT: 3007
      MONGODB_URI: mongodb://eventhub:eventhub123@mongodb:27017/eventhub?authSource=admin
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 2525
      SMTP_USER: your_smtp_user
      SMTP_PASS: your_smtp_pass
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - eventhub-network

  # Media Service
  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    container_name: eventhub-media-service
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: development
      PORT: 3008
      MONGODB_URI: mongodb://eventhub:eventhub123@mongodb:27017/eventhub?authSource=admin
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: eventhub
      MINIO_SECRET_KEY: eventhub123
      MINIO_BUCKET: eventhub-media
    depends_on:
      - mongodb
      - redis
      - kafka
      - minio
    networks:
      - eventhub-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
  minio_data:

networks:
  eventhub-network:
    driver: bridge
