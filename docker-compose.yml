version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: eventhub-postgres
    environment:
      POSTGRES_USER: eventhub
      POSTGRES_PASSWORD: eventhub123
      POSTGRES_DB: eventhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - eventhub-network

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: eventhub-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: eventhub
      MONGO_INITDB_ROOT_PASSWORD: eventhub123
      MONGO_INITDB_DATABASE: eventhub
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - eventhub-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: eventhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eventhub-network

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: eventhub-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - eventhub-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eventhub-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - eventhub-network

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: eventhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eventhub
      MINIO_ROOT_PASSWORD: eventhub123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - eventhub-network

  # API Gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: eventhub-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - kafka
    networks:
      - eventhub-network

  # User Service
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: eventhub-user-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://eventhub:eventhub123@postgres:5432/eventhub
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - eventhub-network

  # Profile Service (ensure folder exists)
  # profile-service:
  #   build:
  #     context: ./services/profile-service
  #     dockerfile: Dockerfile
  #   container_name: eventhub-profile-service
  #   ports:
  #     - "3002:3002"
  #   environment:
  #     NODE_ENV: development
  #     PORT: 3002
  #     MONGODB_URI: mongodb://eventhub:eventhub123@mongodb:27017/eventhub?authSource=admin
  #     REDIS_URL: redis://redis:6379
  #     KAFKA_BROKERS: kafka:29092
  #   depends_on:
  #     - mongodb
  #     - redis
  #     - kafka
  #   networks:
  #     - eventhub-network

# Volumes
volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  minio_data:

# Network
networks:
  eventhub-network:
    driver: bridge
